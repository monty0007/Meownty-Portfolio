name: Backup Portfolio Data

on:
  # Every 3 days at 03:00 UTC
  schedule:
    - cron: '0 3 */3 * *'
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Ensure backup branch exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/git/refs/heads/backup \
            --silent 2>/dev/null || \
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/heads/backup" \
            -f sha="$(gh api repos/${{ github.repository }}/git/refs/heads/${{ github.ref_name }} --jq '.object.sha')"

      - name: Run backup
        env:
          VITE_TURSO_DATABASE_URL: ${{ secrets.VITE_TURSO_DATABASE_URL }}
          VITE_TURSO_AUTH_TOKEN: ${{ secrets.VITE_TURSO_AUTH_TOKEN }}
          BACKUP_GH_TOKEN: ${{ github.token }}
          BACKUP_REPO: ${{ github.repository }}
          BACKUP_BRANCH: backup
        run: node scripts/backup-to-github.cjs
